# cargo-deny configuration (CI supply-chain gate)
#
# Filed per gauntlet round 1 finding F9-2 (deny.toml missing).
# Configured to be permissive on widely-used OSS licenses while flagging
# real supply-chain risks (vulns + duplicate deps + non-OSI sources).

[graph]
# Run on the host platform plus the published-release targets.
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]
all-features = false
no-default-features = false

[licenses]
# All canonical OSI-approved + permissive licenses cass actually depends on.
# Discovered via `cargo deny check licenses` rejection messages on first run.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "ISC",
    "0BSD",
    "CC0-1.0",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "Unlicense",
    "BSL-1.0",            # Boost Software License — permissive OSS
    "CDLA-Permissive-2.0", # Community Data License Agreement — permissive
    "LPPL-1.3c",          # LaTeX Project Public License — permissive
]
confidence-threshold = 0.93
exceptions = []

# Sibling Franken-* crates lack a `license = "..."` field in their Cargo.toml.
# Per the cass README ("license-MIT%2BOpenAI%2FAnthropic%20Rider-green.svg"),
# the project license is MIT + OpenAI/Anthropic rider. The sibling crates
# inherit this. Clarify per-crate until the upstream Cargo.toml entries
# are filled in.
[[licenses.clarify]]
name = "coding-agent-search"
expression = "MIT"
license-files = []

