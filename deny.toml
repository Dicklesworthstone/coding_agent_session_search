[advisories]
# Use the latest advisory-db revision (no version pin).
# Informational warnings escalate to errors by default; ignore the
# 4 specific unmaintained-crate advisories that block transitively
# through syntect/reqwest dep chains. These are evaluated each round
# of the gauntlet — revisit when a viable replacement lands.
yanked = "deny"
ignore = [
    # bincode v1 unmaintained — widely used; pending team-level migration call
    "RUSTSEC-2025-0141",
    # paste unmaintained — no functional successor offers drop-in compat
    "RUSTSEC-2024-0436",
    # rustls-pemfile unmaintained — migration to rustls-pki-types pending
    "RUSTSEC-2025-0134",
    # yaml-rust unmaintained — via syntect; cannot upgrade syntect without breaking
    "RUSTSEC-2024-0320",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
# No specific crate bans yet; revisit when supply-chain audits surface a target.
allow = []
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# Sibling projects pinned via [patch] entries in Cargo.toml or as path-deps.
# Github org `Dicklesworthstone` covers frankensqlite, frankensearch,
# franken_agent_detection, frankentui, asupersync, toon.
allow-git = [
    "https://github.com/Dicklesworthstone/frankensqlite",
    "https://github.com/Dicklesworthstone/frankensearch",
    "https://github.com/Dicklesworthstone/franken_agent_detection",
    "https://github.com/Dicklesworthstone/frankentui",
    "https://github.com/Dicklesworthstone/asupersync",
    "https://github.com/Dicklesworthstone/toon",
]
